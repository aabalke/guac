name: Automated Release

on:
  push:
    branches:
      - main
      - master # Added master just in case that's your default branch
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Fetches all history and tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # This step ensures the local runner "knows" about the tag created above
      - name: Fetch new tags
        run: git fetch --tags --force

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicitly tell GoReleaser which tag to use
          GORELEASER_CURRENT_TAG: ${{ steps.tag_version.outputs.new_tag }}
