name: Guac Builder

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Auto-generate version tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Build for Linux (Standard AMD64)
      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -o guac-linux-amd64 .

      # Build for Windows (Standard AMD64)
      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -o guac-windows-x64.exe .

      # The release action that i hope works
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            Automated build for GUAC.
            ${{ steps.tag_version.outputs.changelog }}
          files: |
            guac-linux-amd64
            guac-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
